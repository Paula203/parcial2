    <style>
       body {
    background: linear-gradient(45deg, #ffffff 0%, #a76666 100%);
    min-height: 100vh;
    margin: 0;
    display: flex;
    flex-direction: column; 
    justify-content: center;
    align-items: center;
    font-family: 'Arial', sans-serif;
    gap: 20px; 
}
h1 {
    margin: 0;
    color: #4a1414; 
}
canvas {
    background-color: rgba(255, 255, 255, 0.3); 
    border: 2px solid rgba(255, 255, 255, 0.4);
    border-radius: 20px;

}
button {
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    background-color: #4a1414;
    color: white;
    cursor: pointer;
    transition: transform 0.2s;
}
button:hover {
    transform: scale(1.05); 
}
